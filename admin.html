<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Marsiajar Maretong</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <nav class="bg-slate-900 text-white py-4 px-6 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-500 rounded flex items-center justify-center">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="font-bold text-xl tracking-wide">Marsiajar Admin Panel</h1>
        </div>
        <a href="index.html" target="_blank" class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition border border-slate-700">
            <i class="fas fa-external-link-alt mr-2"></i>Lihat Website
        </a>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-24">
                <h2 class="text-xl font-bold mb-6 border-b pb-3">Tambah Modul Baru</h2>
                
                <form id="form-tambah" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Judul Modul <span class="text-red-500">*</span></label>
                        <input type="text" id="input-judul" required placeholder="Contoh: Try Out SNBT Premium" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Kategori <span class="text-red-500">*</span></label>
                            <select id="input-kategori" required class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 outline-none text-sm">
                                <option value="utbk">UTBK-SNBT</option>
                                <option value="mandiri">MANDIRI PTN</option>
                                <option value="cpns">CPNS</option>
                                <option value="tka">TKA</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Harga (Rp) <span class="text-red-500">*</span></label>
                            <input type="number" id="input-harga" required placeholder="45000" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 outline-none text-sm">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Label / Tag</label>
                            <input type="text" id="input-tag" placeholder="HOT ITEM" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Ikon (FA)</label>
                            <input type="text" id="input-icon" value="fa-book" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">Tema Warna</label>
                        <div class="flex gap-3">
                            <label class="cursor-pointer"><input type="radio" name="tema" value="blue" checked class="peer sr-only"><div class="w-8 h-8 rounded-full bg-blue-500 peer-checked:ring-2 ring-blue-600 ring-offset-2"></div></label>
                            <label class="cursor-pointer"><input type="radio" name="tema" value="red" class="peer sr-only"><div class="w-8 h-8 rounded-full bg-red-500 peer-checked:ring-2 ring-red-600 ring-offset-2"></div></label>
                            <label class="cursor-pointer"><input type="radio" name="tema" value="emerald" class="peer sr-only"><div class="w-8 h-8 rounded-full bg-emerald-500 peer-checked:ring-2 ring-emerald-600 ring-offset-2"></div></label>
                            <label class="cursor-pointer"><input type="radio" name="tema" value="purple" class="peer sr-only"><div class="w-8 h-8 rounded-full bg-purple-500 peer-checked:ring-2 ring-purple-600 ring-offset-2"></div></label>
                        </div>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-md transition active:scale-95 mt-4">
                        <i class="fas fa-save mr-2"></i> Simpan ke Database
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h2 class="text-xl font-bold text-slate-800">Daftar Modul Saat Ini</h2>
                    <button onclick="loadData()" class="text-sm bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-100 transition">
                        <i class="fas fa-sync-alt mr-1"></i> Refresh
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                                <th class="p-4 font-semibold">Ikon & Judul</th>
                                <th class="p-4 font-semibold">Kategori</th>
                                <th class="p-4 font-semibold">Harga</th>
                                <th class="p-4 font-semibold text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-body" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[2000] bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-32 transition-transform duration-500">
        <span id="toast-msg" class="text-sm font-semibold"></span>
    </div>

    <script>
        let supabaseClient;
        const tbody = document.getElementById('tabel-body');

        function initDatabase() {
            try {
                const supabaseUrl = 'https://qyibrftzgezfatvbcqem.supabase.co';
                const supabaseKey = 'sb_publishable_i27V8ZT7Gv008BjCvIckxQ_cMN75n2b';
                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
                loadData();
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold">Gagal Koneksi: ${error.message}</td></tr>`;
            }
        }

        async function loadData() {
            if (!supabaseClient) return;
            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-blue-500"><i class="fas fa-spinner fa-spin text-3xl"></i></td></tr>';
            
            try {
                const { data, error } = await supabaseClient.from('products').select('*').order('id', { ascending: false });
                if (error) throw error;
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400">Database Kosong.</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(item => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg ${item.bg || 'bg-slate-100'} flex items-center justify-center shrink-0">
                                <i class="fas ${item.icon || 'fa-book'} ${item.warna || 'text-slate-500'}"></i>
                            </div>
                            <p class="font-bold text-slate-800">${item.title || item.judul}</p>
                        </td>
                        <td class="p-4 text-slate-600 uppercase text-xs font-bold">${item.category || item.kategori}</td>
                        <td class="p-4 font-black text-blue-600">Rp ${(item.price || item.harga || 0).toLocaleString('id-ID')}</td>
                        <td class="p-4 text-center">
                            <button onclick="hapusProduk('${item.id}', '${item.title || item.judul}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold">Error: ${err.message}</td></tr>`;
            }
        }

        async function tambahProduk() {
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = 'Menyimpan...';
            btn.disabled = true;

            try {
                const temaDipilih = document.querySelector('input[name="tema"]:checked').value;
                const mappingWarna = {
                    blue: { warna: 'text-blue-500', bg: 'bg-blue-50' },
                    red: { warna: 'text-red-500', bg: 'bg-red-50' },
                    emerald: { warna: 'text-emerald-500', bg: 'bg-emerald-50' },
                    purple: { warna: 'text-purple-500', bg: 'bg-purple-50' }
                };

                const dataBaru = {
                    title: document.getElementById('input-judul').value,
                    judul: document.getElementById('input-judul').value,
                    category: document.getElementById('input-kategori').value,
                    kategori: document.getElementById('input-kategori').value,
                    price: parseInt(document.getElementById('input-harga').value),
                    harga: parseInt(document.getElementById('input-harga').value),
                    tag: document.getElementById('input-tag').value,
                    icon: document.getElementById('input-icon').value,
                    warna: mappingWarna[temaDipilih].warna,
                    bg: mappingWarna[temaDipilih].bg
                };

                const { error } = await supabaseClient.from('products').insert([dataBaru]);
                if (error) throw error;
                showToast("✅ Berhasil disimpan!");
                document.getElementById('form-tambah').reset();
                loadData();
            } catch (err) {
                alert("Gagal: " + err.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> Simpan ke Database';
                btn.disabled = false;
            }
        }

        async function hapusProduk(id, nama) {
            if(confirm(`Hapus ${nama}?`)) {
                await supabaseClient.from('products').delete().eq('id', id);
                loadData();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-32');
            setTimeout(() => t.classList.add('translate-y-32'), 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('form-tambah').addEventListener('submit', (e) => {
                e.preventDefault();
                tambahProduk();
            });
            initDatabase();
        });
    </script>
</body>
</html>
