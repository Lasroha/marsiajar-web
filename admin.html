<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Marsiajar Maretong</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <nav class="bg-slate-900 text-white py-4 px-6 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-500 rounded flex items-center justify-center">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="font-bold text-xl tracking-wide">Marsiajar Admin Panel</h1>
        </div>
        <a href="index.html" target="_blank" class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition border border-slate-700">
            <i class="fas fa-external-link-alt mr-2"></i>Lihat Website
        </a>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-24">
                <h2 class="text-xl font-bold mb-6 border-b pb-3">Tambah Modul Baru</h2>
                
                <form id="form-tambah" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Judul Modul <span class="text-red-500">*</span></label>
                        <input type="text" id="input-judul" required placeholder="Contoh: Try Out SNBT Premium" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Kategori <span class="text-red-500">*</span></label>
                            <select id="input-kategori" required class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm">
                                <option value="utbk">UTBK-SNBT</option>
                                <option value="mandiri">MANDIRI PTN</option>
                                <option value="cpns">CPNS</option>
                                <option value="tka">TKA</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Harga (Rp) <span class="text-red-500">*</span></label>
                            <input type="number" id="input-harga" required placeholder="Contoh: 45000" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Label / Tag</label>
                            <input type="text" id="input-tag" placeholder="HOT ITEM, NEW..." class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Ikon (FontAwesome)</label>
                            <input type="text" id="input-icon" placeholder="fa-book, fa-calculator" value="fa-book" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:border-blue-500 outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">Tema Warna Kartu</label>
                        <div class="flex gap-3">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="tema" value="blue" checked class="peer sr-only">
                                <div class="w-8 h-8 rounded-full bg-blue-500 ring-2 ring-transparent peer-checked:ring-blue-600 peer-checked:ring-offset-2 transition-all"></div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="tema" value="red" class="peer sr-only">
                                <div class="w-8 h-8 rounded-full bg-red-500 ring-2 ring-transparent peer-checked:ring-red-600 peer-checked:ring-offset-2 transition-all"></div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="tema" value="emerald" class="peer sr-only">
                                <div class="w-8 h-8 rounded-full bg-emerald-500 ring-2 ring-transparent peer-checked:ring-emerald-600 peer-checked:ring-offset-2 transition-all"></div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="tema" value="purple" class="peer sr-only">
                                <div class="w-8 h-8 rounded-full bg-purple-500 ring-2 ring-transparent peer-checked:ring-purple-600 peer-checked:ring-offset-2 transition-all"></div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="tema" value="orange" class="peer sr-only">
                                <div class="w-8 h-8 rounded-full bg-orange-500 ring-2 ring-transparent peer-checked:ring-orange-600 peer-checked:ring-offset-2 transition-all"></div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-md transition active:scale-95 mt-4">
                        <i class="fas fa-save mr-2"></i> Simpan ke Database
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h2 class="text-xl font-bold text-slate-800">Daftar Modul Saat Ini</h2>
                    <button onclick="loadData()" class="text-sm bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-100 transition shadow-sm active:scale-95">
                        <i class="fas fa-sync-alt mr-1"></i> Refresh
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                                <th class="p-4 font-semibold">Ikon & Judul</th>
                                <th class="p-4 font-semibold">Kategori</th>
                                <th class="p-4 font-semibold">Harga</th>
                                <th class="p-4 font-semibold text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-body" class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[2000] bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-32 transition-transform duration-500 flex items-center gap-3">
        <span id="toast-msg" class="text-sm font-semibold"></span>
    </div>

    <script>
        let supabase;
        const tbody = document.getElementById('tabel-body');

        // ==========================================
        // 1. INISIALISASI DATABASE ANTI-CRASH
        // ==========================================
        function initDatabase() {
            try {
                const supabaseUrl = 'https://qyibrftzgezfatvbcqem.supabase.co';
                const supabaseKey = 'sb_publishable_i27V8ZT7Gv008BjCvIckxQ_cMN75n2b';
                
                if (!window.supabase) {
                    throw new Error("Library Supabase gagal dimuat dari CDN. Cek koneksi internet Anda.");
                }
                
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                console.log("Supabase berhasil diinisialisasi!");
                loadData(); // Langsung load data jika sukses
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold bg-red-50">
                    <i class="fas fa-exclamation-triangle text-2xl mb-2"></i><br>Sistem Gagal Terhubung ke Database!<br><span class="text-xs font-normal mt-2 block">${error.message}</span>
                </td></tr>`;
                showToast("❌ Gagal inisialisasi Database.");
            }
        }

        // ==========================================
        // 2. MENGAMBIL DATA (READ)
        // ==========================================
        async function loadData() {
            if (!supabase) return;

            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-blue-500"><i class="fas fa-circle-notch fa-spin text-3xl mb-3"></i><br><span class="font-bold">Menghubungkan ke Supabase...</span></td></tr>';
            
            try {
                const { data, error } = await supabase.from('products').select('*').order('id', { ascending: false });
                
                if (error) throw error;

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400 font-medium">Belum ada modul di database. Silakan isi form di samping.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(item => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg ${item.bg || 'bg-slate-100'} flex items-center justify-center shrink-0 shadow-sm">
                                <i class="fas ${item.icon || 'fa-book'} ${item.warna || 'text-slate-500'}"></i>
                            </div>
                            <div>
                                <p class="font-bold text-slate-800">${item.title || item.judul}</p>
                                ${item.tag ? `<span class="text-[9px] bg-red-100 text-red-600 px-2 py-0.5 rounded font-bold">${item.tag}</span>` : ''}
                            </div>
                        </td>
                        <td class="p-4 text-slate-600 uppercase text-xs font-bold tracking-wider">${item.category || item.kategori}</td>
                        <td class="p-4 font-black text-blue-600">Rp ${(item.price || item.harga).toLocaleString('id-ID')}</td>
                        <td class="p-4 text-center">
                            <button onclick="hapusProduk('${item.id}', '${item.title || item.judul}')" class="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-colors shadow-sm" title="Hapus Permanen">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold"><i class="fas fa-times-circle text-2xl mb-2"></i><br>Gagal memuat data dari Supabase.<br><span class="text-xs font-normal">${err.message}</span></td></tr>`;
            }
        }

        // ==========================================
        // 3. MENAMBAH DATA (CREATE)
        // ==========================================
        async function tambahProduk() {
            if (!supabase) return alert("Database belum terhubung!");

            const btn = document.getElementById('btn-submit');
            const teksAsli = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Menyimpan...';
            btn.disabled = true;

            try {
                // Pemetaan Warna Tailwind
                const temaDipilih = document.querySelector('input[name="tema"]:checked').value;
                const mappingWarna = {
                    blue: { warna: 'text-blue-500', bg: 'bg-blue-50' },
                    red: { warna: 'text-red-500', bg: 'bg-red-50' },
                    emerald: { warna: 'text-emerald-500', bg: 'bg-emerald-50' },
                    purple: { warna: 'text-purple-500', bg: 'bg-purple-50' },
                    orange: { warna: 'text-orange-500', bg: 'bg-orange-50' }
                };

                const dataBaru = {
                    title: document.getElementById('input-judul').value,
                    category: document.getElementById('input-kategori').value,
                    price: parseInt(document.getElementById('input-harga').value),
                    tag: document.getElementById('input-tag').value,
                    icon: document.getElementById('input-icon').value || 'fa-book',
                    warna: mappingWarna[temaDipilih].warna,
                    bg: mappingWarna[temaDipilih].bg
                };

                // Kirim data
                const { error } = await supabase.from('products').insert([dataBaru]);

                if (error) throw error;

                showToast("✅ Modul berhasil disimpan ke Supabase!");
                document.getElementById('form-tambah').reset();
                loadData(); // Segarkan tabel secara otomatis

            } catch (err) {
                alert("GAGAL MENYIMPAN!\nPesan Error dari Database:\n" + err.message + "\n\nPastikan gembok RLS Supabase sudah terbuka.");
                showToast("❌ Gagal menyimpan data.");
            } finally {
                btn.innerHTML = teksAsli;
                btn.disabled = false;
            }
        }

        // ==========================================
        // 4. MENGHAPUS DATA (DELETE)
        // ==========================================
        async function hapusProduk(id, namaProduk) {
            if(confirm(`Yakin ingin MENGHAPUS PERMANEN modul:\n"${namaProduk}"?`)) {
                showToast("⏳ Sedang menghapus...");
                try {
                    const { error } = await supabase.from('products').delete().eq('id', id);
                    if(error) throw error;
                    
                    showToast("✅ Modul dihapus!");
                    loadData();
                } catch (err) {
                    alert("Gagal menghapus data: " + err.message);
                }
            }
        }

        // ==========================================
        // 5. EVENT LISTENER ANTI-REFRESH
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Ini menjamin halaman tidak akan PERNAH refresh saat tombol submit diklik
            const form = document.getElementById('form-tambah');
            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault(); // Kunci utama mencegah refresh
                    tambahProduk();
                });
            }

            // Jalankan inisialisasi database
            initDatabase();
        });

        // Utils
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
        }
    </script>
</body>
</html>
