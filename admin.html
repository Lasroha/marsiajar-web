<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin V2 - Marsiajar Maretong</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .badge-pending { @apply bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase; }
        .badge-lunas { @apply bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white min-h-screen w-64 fixed left-0 top-0 p-6 hidden md:block z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/50">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="font-bold text-xl">Admin Panel</h1>
        </div>
        <div class="space-y-2">
            <button onclick="switchTab('tab-produk', this)" class="tab-btn w-full text-left px-4 py-3 rounded-xl bg-blue-600 font-bold flex items-center gap-3 transition">
                <i class="fas fa-box"></i> Manajemen Modul
            </button>
            <button onclick="switchTab('tab-log', this)" class="tab-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold flex items-center gap-3 transition">
                <i class="fas fa-users"></i> Log Pembeli
            </button>
            <a href="index.html" class="block w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold flex items-center gap-3 transition">
                <i class="fas fa-external-link-alt"></i> Lihat Website
            </a>
        </div>
    </nav>

    <main class="md:ml-64 p-4 md:p-10">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Total Modul</p>
                <h3 id="stat-total" class="text-3xl font-black text-slate-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Total Transaksi</p>
                <h3 id="stat-log" class="text-3xl font-black text-blue-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Sistem</p>
                <h3 class="text-emerald-500 font-black">ONLINE</h3>
            </div>
        </div>

        <div id="tab-produk" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <h2 class="font-bold mb-6">Tambah Modul</h2>
                        <form id="form-produk" class="space-y-4">
                            <input type="text" id="judul" placeholder="Judul Modul" required class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                            <input type="number" id="harga" placeholder="Harga Jual" required class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                            <input type="number" id="asli" placeholder="Harga Asli (Untuk Coret)" class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                            <select id="kategori" class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                                <option value="UTBK">UTBK-SNBT</option>
                                <option value="MATEMATIKA">MATEMATIKA</option>
                            </select>
                            <input type="text" id="tag" placeholder="Tag (HOTS/PROMO)" class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">Simpan Modul</button>
                        </form>
                    </div>
                </div>
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden text-sm">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 font-bold text-slate-400 uppercase text-[10px]">
                                <tr><th class="p-4">Modul</th><th class="p-4">Harga</th><th class="p-4">Aksi</th></tr>
                            </thead>
                            <tbody id="tabel-produk" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-log" class="tab-content">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b">
                    <h2 class="font-bold text-slate-800 tracking-tight">Log Transaksi Siswa</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Klik pada status untuk mengubah (Pending/Lunas)</p>
                </div>
                <div class="overflow-x-auto text-sm">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 font-bold text-slate-400 uppercase text-[10px]">
                            <tr>
                                <th class="p-4">Tanggal</th>
                                <th class="p-4">Email Siswa</th>
                                <th class="p-4">Produk</th>
                                <th class="p-4 text-center">Status</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-log" class="divide-y font-medium text-slate-600"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://qyibrftzgezfatvbcqem.supabase.co';
        const supabaseKey = 'sb_publishable_i27V8ZT7Gv008BjCvIckxQ_cMN75n2b';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('bg-blue-600', 'hover:bg-slate-800'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.replace('hover:bg-slate-800', 'bg-blue-600');
        }

        async function loadData() {
            // Load Produk
            const { data: produk } = await client.from('products').select('*').order('id', { ascending: false });
            if (produk) {
                document.getElementById('stat-total').innerText = produk.length;
                document.getElementById('tabel-produk').innerHTML = produk.map(p => `
                    <tr>
                        <td class="p-4 font-bold">${p.judul || p.title}</td>
                        <td class="p-4">Rp ${p.harga.toLocaleString()}</td>
                        <td class="p-4"><button onclick="hapus('${p.id}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button></td>
                    </tr>`).join('');
            }

            // Load Log Pembeli
            const { data: logs } = await client.from('log_pembeli').select('*').order('id', { ascending: false });
            if (logs) {
                document.getElementById('stat-log').innerText = logs.length;
                document.getElementById('tabel-log').innerHTML = logs.map(l => {
                    const status = l.status || 'Pending';
                    const badgeClass = status === 'Lunas' ? 'badge-lunas' : 'badge-pending';
                    return `
                    <tr>
                        <td class="p-4 text-xs opacity-60">${new Date(l.created_at).toLocaleDateString()}</td>
                        <td class="p-4 font-bold text-blue-600">${l.email}</td>
                        <td class="p-4 italic">${l.produk_diminati}</td>
                        <td class="p-4 text-center">
                            <button onclick="updateStatus('${l.id}', '${status}')" class="${badgeClass}">
                                ${status}
                            </button>
                        </td>
                        <td class="p-4 text-center">
                            <a href="mailto:${l.email}" class="text-blue-500 hover:underline text-xs font-bold">Email</a>
                        </td>
                    </tr>`;
                }).join('');
            }
        }

        async function updateStatus(id, currentStatus) {
            const nextStatus = currentStatus === 'Pending' ? 'Lunas' : 'Pending';
            const { error } = await client.from('log_pembeli').update({ status: nextStatus }).eq('id', id);
            if(!error) loadData();
        }

        document.getElementById('form-produk').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                judul: document.getElementById('judul').value,
                title: document.getElementById('judul').value,
                harga: parseInt(document.getElementById('harga').value),
                price: parseInt(document.getElementById('harga').value),
                asli: parseInt(document.getElementById('asli').value) || 0,
                kategori: document.getElementById('kategori').value,
                category: document.getElementById('kategori').value,
                tag: document.getElementById('tag').value,
                warna: 'text-blue-600', bg: 'bg-blue-50', icon: 'fa-book'
            };
            await client.from('products').insert([data]);
            loadData();
            e.target.reset();
        });

        async function hapus(id) {
            if(confirm("Hapus?")) { await client.from('products').delete().eq('id', id); loadData(); }
        }

        window.onload = loadData;
    </script>
</body>
</html>
