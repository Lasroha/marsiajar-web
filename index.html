<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marsiajar Maretong - Solusi Lulus Ujian Digital</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .modal-active { overflow: hidden; }
        #payment-modal, #auth-modal, #ai-modal { transition: all 0.3s ease; }
        html { scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        @keyframes pulse-ai {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .ai-float-btn { animation: pulse-ai 2s infinite; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <nav class="glass-nav border-b border-slate-200 sticky top-0 z-[500] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <img src="LOGO.jpg" alt="Logo Marsiajar" class="h-14 w-auto">
                    <span class="text-xl font-extrabold text-blue-700 uppercase">Marsiajar</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#beranda" class="text-sm font-semibold text-slate-600 hover:text-blue-600">Beranda</a>
                    <a href="#kategori" class="text-sm font-semibold text-slate-600 hover:text-blue-600">Kategori</a>
                    <a href="#testimoni" class="text-sm font-semibold text-slate-600 hover:text-blue-600">Testimoni</a>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="bukaAuth('login')" class="text-sm font-bold text-blue-600 px-4">Masuk</button>
                    <button onclick="bukaAuth('register')" class="bg-blue-600 text-white text-sm font-bold px-6 py-2.5 rounded-xl shadow-md">Daftar</button>
                </div>
            </div>
        </div>
    </nav>

    <header id="beranda" class="bg-blue-600 py-20 px-4 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6">Kuasai Ujianmu dengan <span class="text-orange-400">Latihan Tepat</span></h1>
        <p class="text-blue-100 text-lg max-w-2xl mx-auto mb-10">Koleksi soal premium berdasarkan kisi-kisi terbaru dan paling akurat.</p>
    </header>

    <main id="kategori" class="max-w-7xl mx-auto px-4 py-20">
        <h2 class="text-3xl font-extrabold text-slate-800 border-l-4 border-blue-600 pl-4 mb-10">Katalog Modul</h2>
        
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                <p class="mt-4 text-slate-500">Memuat modul...</p>
            </div>
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center py-16">
            <p class="text-gray-500">Modul tidak ditemukan.</p>
        </div>
    </main>

    <div id="payment-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl">
            <h2 id="modal-item-name" class="text-2xl font-bold mb-2"></h2>
            <p id="modal-item-price" class="text-blue-600 font-black text-xl mb-6"></p>
            <input type="email" id="buyer-email" placeholder="Masukkan Email Anda" class="w-full border p-3 rounded-xl mb-4 outline-none focus:border-blue-500">
            <button onclick="prosesBayar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">Konfirmasi Pembelian</button>
            <button onclick="tutupModal()" class="w-full text-slate-400 mt-4">Batal</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[2000] bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-32 transition-transform duration-500">
        <span id="toast-msg"></span>
    </div>

    <script>
        // 1. SETUP SUPABASE
        const supabaseUrl = 'https://qyibrftzgezfatvbcqem.supabase.co';
        const supabaseKey = 'sb_publishable_i27V8ZT7Gv008BjCvIckxQ_cMN75n2b';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. FUNGSI AMBIL DATA PRODUK
        async function fetchProducts() {
            const productGrid = document.getElementById('product-grid');
            
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id', { ascending: false });
                
                if (error) throw error;

                if (!data || data.length === 0) {
                    productGrid.innerHTML = '<p class="col-span-full text-center text-slate-500 py-10">Belum ada modul tersedia saat ini.</p>';
                    return;
                }

                productGrid.innerHTML = data.map(item => {
                    const judul = item.title || item.judul || 'Tanpa Judul';
                    const harga = item.price || item.harga || 0;
                    const kategori = item.category || item.kategori || 'Umum';
                    const ikon = item.icon || 'fa-book';
                    const warnaTeks = item.warna || 'text-blue-500';
                    const warnaBg = item.bg || 'bg-blue-50';

                    return `
                        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 group">
                            <div class="w-14 h-14 ${warnaBg} rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <i class="fas ${ikon} ${warnaTeks} text-2xl"></i>
                            </div>
                            <div class="mb-4">
                                <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">${kategori}</span>
                                <h3 class="text-xl font-bold text-slate-800 mt-1">${judul}</h3>
                            </div>
                            <div class="flex items-center justify-between mt-8 pt-6 border-t border-slate-50">
                                <div>
                                    <p class="text-xs text-slate-400 font-medium">Investasi</p>
                                    <p class="text-lg font-black text-blue-600">Rp ${harga.toLocaleString('id-ID')}</p>
                                </div>
                                <button onclick="bukaModalPilih('${judul}', ${harga})" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-bold text-sm hover:bg-blue-600 transition-colors shadow-lg">
                                    Beli
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Gagal memuat:", err);
                productGrid.innerHTML = `<p class="col-span-full text-center text-red-500">Gagal memuat data dari database.</p>`;
            }
        }

        // 3. FUNGSI MODAL & PEMBAYARAN
        function bukaModalPilih(judul, harga) {
            document.getElementById('modal-item-name').innerText = judul;
            document.getElementById('modal-item-price').innerText = "Rp " + harga.toLocaleString('id-ID');
            document.getElementById('payment-modal').classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function tutupModal() {
            document.getElementById('payment-modal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        function prosesBayar() {
            const email = document.getElementById('buyer-email').value;
            if(!email.includes('@')) return alert("Masukkan email yang benar!");
            tutupModal();
            showToast("✅ Instruksi pembayaran dikirim ke " + email);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-32');
            setTimeout(() => t.classList.add('translate-y-32'), 4000);
        }

        // 4. JALANKAN SAAT START
        document.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
