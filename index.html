<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marsiajar Maretong - Solusi Lulus Ujian Digital</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .modal-active { overflow: hidden; }
        #payment-modal, #auth-modal { transition: all 0.3s ease; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <nav class="glass-nav border-b border-slate-200 sticky top-0 z-[500] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="LOGO.jpg" alt="Logo" class="h-12 w-auto">
                <span class="text-xl font-black text-blue-700 uppercase tracking-tighter">Marsiajar</span>
            </div>
            <div class="hidden md:flex gap-8 font-bold text-sm text-slate-600">
                <a href="#beranda" class="hover:text-blue-600">Beranda</a>
                <a href="#kategori" class="hover:text-blue-600">E-Book</a>
                <a href="#testimoni" class="hover:text-blue-600">Testimoni</a>
            </div>
            <div class="flex gap-3">
                <button onclick="bukaAuth()" class="text-sm font-bold text-blue-600 px-4">Masuk</button>
                <button onclick="bukaAuth()" class="bg-blue-600 text-white text-sm font-bold px-6 py-2.5 rounded-xl shadow-md">Daftar</button>
            </div>
        </div>
    </nav>

    <header id="beranda" class="bg-blue-600 py-24 px-4 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6">Lolos Kampus Impian dengan <span class="text-orange-400 italic">Latihan Tepat</span></h1>
        <p class="text-blue-100 text-lg max-w-2xl mx-auto">Bank soal premium UTBK-SNBT, CPNS, dan Ujian Mandiri terupdate.</p>
    </header>

    <main id="kategori" class="max-w-7xl mx-auto px-4 py-20">
        <h2 class="text-3xl font-extrabold text-slate-800 border-l-4 border-blue-600 pl-4 mb-10">Katalog Modul Terbaru</h2>
        
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div id="loading-state" class="col-span-full text-center py-20">
                <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                <p class="text-slate-500 font-bold">Menghubungkan ke Database...</p>
            </div>
        </div>
    </main>

    <div id="payment-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl">
            <h2 id="modal-item-name" class="text-2xl font-bold mb-2 text-slate-800"></h2>
            <p id="modal-item-price" class="text-blue-600 font-black text-2xl mb-6"></p>
            <input type="email" id="buyer-email" placeholder="Masukkan Email Anda" class="w-full border-2 border-slate-100 p-4 rounded-xl mb-4 outline-none focus:border-blue-500">
            <button onclick="prosesBayar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">Konfirmasi Pembelian</button>
            <button onclick="tutupModal()" class="w-full text-slate-400 mt-4 font-bold">Batal</button>
        </div>
    </div>

    <script>
        // Gunakan nama variabel yang unik agar tidak bentrok
        let mySupabase;

        function initApp() {
            const supabaseUrl = 'https://qyibrftzgezfatvbcqem.supabase.co';
            const supabaseKey = 'sb_publishable_i27V8ZT7Gv008BjCvIckxQ_cMN75n2b';
            
            try {
                // Inisialisasi sekali saja
                mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                console.log("Supabase Ready!");
                getProducts();
            } catch (e) {
                document.getElementById('product-grid').innerHTML = "<p class='col-span-full text-center text-red-500'>Gagal memuat library database.</p>";
            }
        }

        async function getProducts() {
            const grid = document.getElementById('product-grid');
            
            try {
                const { data, error } = await mySupabase.from('products').select('*').order('id', { ascending: false });
                
                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-10 text-slate-500 font-bold bg-white rounded-2xl border-2 border-dashed">Belum ada modul yang ditambahkan di Halaman Admin.</p>';
                    return;
                }

                // Tampilkan Data
                grid.innerHTML = data.map(item => {
                    // Pakai fallback agar support semua nama kolom
                    const jdl = item.judul || item.title || 'Produk';
                    const hrg = item.harga || item.price || 0;
                    const kat = item.kategori || item.category || 'Modul';
                    const icon = item.icon || 'fa-book';
                    const color = item.warna || 'text-blue-500';
                    const bg = item.bg || 'bg-blue-50';

                    return `
                        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 group">
                            <div class="w-14 h-14 ${bg} rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <i class="fas ${icon} ${color} text-2xl"></i>
                            </div>
                            <div class="mb-4">
                                <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">${kat}</span>
                                <h3 class="text-xl font-bold text-slate-800 mt-1">${jdl}</h3>
                            </div>
                            <div class="flex items-center justify-between mt-8 pt-6 border-t border-slate-50">
                                <div>
                                    <p class="text-[10px] text-slate-400 font-bold">HARGA</p>
                                    <p class="text-lg font-black text-blue-600">Rp ${hrg.toLocaleString('id-ID')}</p>
                                </div>
                                <button onclick="bukaPesan('${jdl}', ${hrg})" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-slate-900 transition-all">
                                    Beli
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">Error Database: ${err.message}</p>`;
            }
        }

        // Fungsi UI
        function bukaPesan(nama, harga) {
            document.getElementById('modal-item-name').innerText = nama;
            document.getElementById('modal-item-price').innerText = "Rp " + harga.toLocaleString('id-ID');
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function tutupModal() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        function prosesBayar() {
            const email = document.getElementById('buyer-email').value;
            if(!email || !email.includes('@')) return alert("Masukkan email yang valid!");
            alert("Instruksi Pembayaran Berhasil Dikirim ke " + email);
            tutupModal();
        }

        function bukaAuth() {
            alert("Fitur Login sedang dipersiapkan. Untuk saat ini Anda bisa langsung memilih modul di bawah.");
        }

        // Jalankan saat halaman siap
        window.onload = initApp;
    </script>
</body>
</html>
