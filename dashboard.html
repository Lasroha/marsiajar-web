<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa - Marsiajar Maretong</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-link.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        .badge-lunas { @apply bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase; }
        .badge-pending { @apply bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase; }
    </style>
</head>
<body class="text-slate-800">

    <aside class="hidden lg:flex flex-col w-72 bg-white h-screen fixed left-0 top-0 border-r border-slate-100 z-50">
        <div class="p-8 flex items-center gap-3">
            <img src="LOGO.jpg" alt="Logo" class="h-10 w-auto rounded-lg">
            <span class="text-xl font-black text-blue-700 uppercase tracking-tighter">Marsiajar</span>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all">
                <i class="fas fa-home w-5"></i> Beranda
            </a>
            <a href="https://wa.me/6282277175018" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition-all">
                <i class="fas fa-headset w-5"></i> Tanya Tutor
            </a>
        </nav>
        <div class="p-4 border-t border-slate-50">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-red-500 hover:bg-red-50 transition-all">
                <i class="fas fa-sign-out-alt w-5"></i> Keluar Akun
            </button>
        </div>
    </aside>

    <main class="lg:ml-72 min-h-screen p-4 lg:p-10">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Halo, <span id="user-name text-blue-600">Siswa</span>! 👋</h1>
                <p class="text-slate-500 font-medium">Progress belajar kamu tercatat di sini.</p>
            </div>
            <div class="flex items-center gap-4 bg-white p-2 pr-6 rounded-full shadow-sm border border-slate-100">
                <div id="user-initial" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-black uppercase">M</div>
                <div>
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Siswa Aktif</p>
                    <p id="user-email" class="text-xs font-bold text-slate-400">email@siswa.com</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2.5rem] text-white shadow-xl shadow-blue-100">
                <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-2">Modul Terverifikasi</p>
                <h3 id="stat-modul" class="text-4xl font-black">0</h3>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Status Akun</p>
                    <h3 class="text-xl font-black text-emerald-500 uppercase">Aktif</h3>
                </div>
                <i class="fas fa-check-circle text-4xl text-emerald-500 opacity-20"></i>
            </div>
        </div>

        <section class="mb-12">
            <h2 class="text-xl font-black text-slate-900 mb-6 px-2">Modul Saya (Siap Download)</h2>
            <div id="my-modules-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

        <section>
            <h2 class="text-xl font-black text-slate-900 mb-6 px-2 text-blue-600">Riwayat Pembelian</h2>
            <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 font-bold text-slate-400 uppercase text-[10px]">
                        <tr>
                            <th class="p-5">Tanggal</th>
                            <th class="p-5">Produk</th>
                            <th class="p-5 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-history" class="divide-y divide-slate-50 font-medium text-slate-600">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        const supabaseUrl = 'https://qyibrftzgezfatvbcqem.supabase.co';
        const supabaseKey = 'sb_publishable_i27V8ZT7Gv008BjCvIckxQ_cMN75n2b';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        document.addEventListener('DOMContentLoaded', async () => {
            const userData = localStorage.getItem('user_marsiajar');
            if (!userData) { window.location.href = 'index.html'; return; }

            const user = JSON.parse(userData);
            document.getElementById('user-name').innerText = user.nama;
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('user-initial').innerText = user.nama.charAt(0);

            loadUserActivity(user.email);
        });

        async function loadUserActivity(email) {
            const modulesGrid = document.getElementById('my-modules-grid');
            const historyTable = document.getElementById('purchase-history');
            const statModul = document.getElementById('stat-modul');

            const { data, error } = await client
                .from('log_pembeli')
                .select('*')
                .eq('email', email)
                .order('created_at', { ascending: false });

            if (error) return;

            // 1. Tampilkan Riwayat Beli
            if (data.length === 0) {
                historyTable.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-slate-400 font-bold uppercase text-[10px]">Belum ada transaksi</td></tr>`;
                modulesGrid.innerHTML = `<p class="col-span-full text-center py-10 text-slate-400 font-bold">Ayo miliki modul pertamamu!</p>`;
                return;
            }

            historyTable.innerHTML = data.map(item => `
                <tr>
                    <td class="p-5 text-xs opacity-60">${new Date(item.created_at).toLocaleDateString()}</td>
                    <td class="p-5 font-bold text-slate-800">${item.produk_diminati}</td>
                    <td class="p-5 text-center">
                        <span class="${item.status === 'Lunas' ? 'badge-lunas' : 'badge-pending'}">${item.status || 'Pending'}</span>
                    </td>
                </tr>
            `).join('');

            // 2. Tampilkan Modul yang Statusnya Lunas
            const lunasModules = data.filter(item => item.status === 'Lunas');
            statModul.innerText = lunasModules.length;

            if (lunasModules.length > 0) {
                modulesGrid.innerHTML = lunasModules.map(item => `
                    <div class="bg-white p-6 rounded-[2rem] border-2 border-blue-50 shadow-sm flex justify-between items-center group hover:border-blue-500 transition-all">
                        <div>
                            <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Materi Aktif</p>
                            <h4 class="font-black text-slate-800">${item.produk_diminati}</h4>
                        </div>
                        <button onclick="alert('File PDF sedang disiapkan untuk akun Anda.')" class="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold text-xs hover:bg-blue-600 transition-all">
                            <i class="fas fa-download mr-2"></i> Download
                        </button>
                    </div>
                `).join('');
            } else {
                modulesGrid.innerHTML = `<p class="col-span-full text-center py-10 bg-slate-50 rounded-3xl text-slate-400 font-bold text-sm">Menunggu verifikasi pembayaran oleh Admin...</p>`;
            }
        }

        function logout() {
            localStorage.removeItem('user_marsiajar');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
