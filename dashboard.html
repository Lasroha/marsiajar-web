<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa - Marsiajar Maretong</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-link.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        .badge-lunas { @apply bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase; }
        .badge-pending { @apply bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase; }
    </style>
</head>
<body class="text-slate-800">

    <aside class="hidden lg:flex flex-col w-72 bg-white h-screen fixed left-0 top-0 border-r border-slate-100 z-50">
        <div class="p-8 flex items-center gap-3">
            <img src="LOGO.jpg" alt="Logo" class="h-10 w-auto rounded-lg shadow-sm">
            <span class="text-xl font-black text-blue-700 uppercase tracking-tighter">Marsiajar</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="sidebar-link active flex items-center gap-3 px-5 py-4 rounded-2xl font-bold transition-all">
                <i class="fas fa-home"></i> Beranda
            </a>
            <a href="https://wa.me/6282277175018" target="_blank" class="flex items-center gap-3 px-5 py-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition-all">
                <i class="fas fa-headset"></i> Tanya Tutor
            </a>
        </nav>
        <div class="p-6 border-t border-slate-50">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-5 py-4 rounded-2xl font-bold text-red-500 hover:bg-red-50 transition-all">
                <i class="fas fa-sign-out-alt"></i> Keluar Akun
            </button>
        </div>
    </aside>

    <main class="lg:ml-72 min-h-screen p-6 lg:p-10">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Halo, <span id="user-name" class="text-blue-600 uppercase">Siswa</span>! 👋</h1>
                <p class="text-slate-500 font-medium mt-1">Status belajar kamu terpantau di sini.</p>
            </div>
            <div class="flex items-center gap-4 bg-white p-3 pr-8 rounded-3xl shadow-sm border border-slate-100">
                <div id="user-initial" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black uppercase text-xl">M</div>
                <div>
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Siswa Terdaftar</p>
                    <p id="user-email" class="text-xs font-bold text-slate-400">email@siswa.com</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-10 rounded-[3rem] text-white shadow-2xl shadow-blue-200 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-blue-100 text-[10px] font-black uppercase tracking-[0.2em] mb-3 opacity-80">Modul Terverifikasi</p>
                    <h3 id="stat-modul" class="text-5xl font-black tracking-tighter">0</h3>
                </div>
                <i class="fas fa-book-reader absolute -right-4 -bottom-4 text-9xl opacity-10"></i>
            </div>
            <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-3">Status Akun</p>
                    <h3 class="text-2xl font-black text-emerald-500 uppercase tracking-tight">Aktif & Aman</h3>
                </div>
                <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 text-2xl">
                    <i class="fas fa-check-circle"></i>
                </div>
            </div>
        </div>

        <section class="mb-16">
            <h2 class="text-2xl font-black text-slate-900 mb-8 px-2 flex items-center gap-3">
                <i class="fas fa-folder-open text-blue-600"></i> Modul Saya
            </h2>
            <div id="my-modules-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="col-span-full text-center py-12">
                    <i class="fas fa-circle-notch fa-spin text-3xl text-blue-600 mb-4"></i>
                    <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Menghubungkan ke pusat data...</p>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-2xl font-black text-slate-900 mb-8 px-2 flex items-center gap-3">
                <i class="fas fa-history text-blue-600"></i> Riwayat Pembelian
            </h2>
            <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 font-black text-slate-400 uppercase text-[10px] tracking-widest">
                            <tr>
                                <th class="p-6">Waktu Transaksi</th>
                                <th class="p-6">Nama Produk</th>
                                <th class="p-6 text-center">Status Akses</th>
                            </tr>
                        </thead>
                        <tbody id="purchase-history" class="divide-y divide-slate-50 font-semibold text-slate-600">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script>
        const supabaseUrl = 'https://qyibrftzgezfatvbcqem.supabase.co';
        const supabaseKey = 'sb_publishable_i27V8ZT7Gv008BjCvIckxQ_cMN75n2b';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        document.addEventListener('DOMContentLoaded', async () => {
            const userData = localStorage.getItem('user_marsiajar');
            
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }

            const user = JSON.parse(userData);
            document.getElementById('user-name').innerText = user.nama;
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('user-initial').innerText = user.nama.charAt(0);

            await loadUserActivity(user.email);
        });

        async function loadUserActivity(email) {
            const modulesGrid = document.getElementById('my-modules-grid');
            const historyTable = document.getElementById('purchase-history');
            const statModul = document.getElementById('stat-modul');

            try {
                // AMBIL DATA DARI SUPABASE
                const { data, error } = await client
                    .from('log_pembeli')
                    .select('*')
                    .eq('email', email)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    historyTable.innerHTML = `<tr><td colspan="3" class="p-16 text-center text-slate-400 font-bold uppercase text-[10px] tracking-widest opacity-50">Belum ada catatan transaksi</td></tr>`;
                    modulesGrid.innerHTML = `
                        <div class="col-span-full bg-white border-2 border-dashed border-slate-200 rounded-[3rem] p-20 text-center">
                            <p class="text-slate-400 font-bold mb-6 italic">Kamu belum memiliki modul premium.</p>
                            <a href="index.html#kategori" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 uppercase text-xs tracking-widest">Buka Katalog Modul</a>
                        </div>`;
                    return;
                }

                // 1. Tampilkan Riwayat
                historyTable.innerHTML = data.map(item => `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="p-6 text-xs font-bold text-slate-400 uppercase tracking-tighter">${new Date(item.created_at).toLocaleString('id-ID')}</td>
                        <td class="p-6 font-black text-slate-800">${item.produk_diminati}</td>
                        <td class="p-6 text-center">
                            <span class="${item.status === 'Lunas' ? 'badge-lunas' : 'badge-pending'}">${item.status || 'Pending'}</span>
                        </td>
                    </tr>
                `).join('');

                // 2. Tampilkan Modul Lunas
                const lunasModules = data.filter(item => item.status === 'Lunas');
                statModul.innerText = lunasModules.length;

                if (lunasModules.length > 0) {
                    modulesGrid.innerHTML = lunasModules.map(item => `
                        <div class="bg-white p-8 rounded-[2.5rem] border-2 border-slate-50 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-6 group hover:border-blue-500 transition-all duration-300">
                            <div class="text-center sm:text-left">
                                <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-2">Terverifikasi</p>
                                <h4 class="font-black text-xl text-slate-800 leading-tight">${item.produk_diminati}</h4>
                            </div>
                            <button onclick="alert('File sedang dikirim ke email Anda atau cek WhatsApp admin untuk link langsung.')" class="bg-slate-900 text-white w-full sm:w-auto px-8 py-4 rounded-2xl font-black text-xs hover:bg-blue-600 transition-all uppercase tracking-widest shadow-xl">
                                <i class="fas fa-download mr-2"></i> Akses File
                            </button>
                        </div>
                    `).join('');
                } else {
                    modulesGrid.innerHTML = `
                        <div class="col-span-full bg-orange-50 border-2 border-dashed border-orange-200 rounded-[3rem] p-12 text-center">
                            <i class="fas fa-hourglass-half text-3xl text-orange-400 mb-4"></i>
                            <p class="text-orange-600 font-bold text-sm tracking-tight">Pembelian kamu sedang menunggu verifikasi admin.<br><span class="text-xs opacity-70">Refresh halaman ini setelah melakukan konfirmasi pembayaran via WhatsApp.</span></p>
                        </div>`;
                }

            } catch (err) {
                console.error(err);
                modulesGrid.innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">Gagal mengambil data. Coba segarkan halaman.</p>`;
            }
        }

        function logout() {
            if(confirm("Yakin ingin keluar?")) {
                localStorage.removeItem('user_marsiajar');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
